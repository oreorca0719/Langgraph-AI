<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>승인 대기</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="page-auth">
  <main class="panel auth-panel">
    <p class="eyebrow">Account Status</p>
    <h1 class="panel-title">승인 대기 중입니다</h1>
    {% if user %}
      <p class="panel-subtitle">계정: <strong>{{ user.email }}</strong></p>
    {% endif %}
    <p class="panel-subtitle">관리자가 승인하면 서비스를 이용할 수 있습니다.</p>
    <a href="/logout" class="primary-btn link-btn">로그아웃</a>
  </main>
</body>
</html>
