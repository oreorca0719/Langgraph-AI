<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | Kaiper</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .home-shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .home-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 36px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 560px) {
      .menu-grid { grid-template-columns: 1fr; }
    }

    .menu-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface-strong);
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
    }

    .menu-card:hover {
      border-color: rgba(87, 208, 255, 0.5);
      background: rgba(15, 35, 60, 0.95);
      transform: translateY(-2px);
    }

    .menu-icon {
      font-size: 28px;
      line-height: 1;
    }

    .menu-label {
      font-size: 16px;
      font-weight: 700;
      margin: 4px 0 0;
    }

    .menu-desc {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="home-shell">
    <div class="home-header">
      <div>
        <p class="eyebrow">Kaiper Admin</p>
        <h1 class="panel-title">관리자 홈</h1>
        <p class="panel-subtitle">{{ user.email }}</p>
      </div>
      <div class="topbar-actions">
        <a href="/" class="admin-btn">메인으로</a>
        <a href="/logout" class="logout-btn">로그아웃</a>
      </div>
    </div>

    <div class="menu-grid">
      <a href="/admin/users" class="menu-card">
        <div class="menu-icon">👤</div>
        <div class="menu-label">사용자 관리</div>
        <div class="menu-desc">가입 승인, 관리자 권한 부여, 계정 삭제</div>
      </a>
      <a href="/admin/monitor" class="menu-card">
        <div class="menu-icon">📡</div>
        <div class="menu-label">모니터</div>
        <div class="menu-desc">실시간 서버 로그 및 라우팅 결정 이력 조회</div>
      </a>
      <div class="menu-card" id="reingest-card" style="cursor:pointer" onclick="runReingest()">
        <div class="menu-icon">🔄</div>
        <div class="menu-label">내부 문서 재인제스트</div>
        <div class="menu-desc" id="reingest-desc">S3 동기화 후 변경된 문서를 벡터 DB에 반영합니다</div>
      </div>
    </div>
  </div>

  <script>
    async function runReingest() {
      const card = document.getElementById('reingest-card');
      const desc = document.getElementById('reingest-desc');
      card.style.pointerEvents = 'none';
      card.style.opacity = '0.6';
      desc.textContent = '실행 중...';
      try {
        const res = await fetch('/admin/api/reingest', { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          desc.textContent = '완료. 서버 로그에서 결과를 확인하세요.';
          card.style.borderColor = 'rgba(124, 240, 200, 0.5)';
        } else {
          desc.textContent = '오류: ' + (data.error || '알 수 없는 오류');
          card.style.borderColor = 'rgba(255, 111, 143, 0.5)';
        }
      } catch (e) {
        desc.textContent = '요청 실패: ' + e.message;
        card.style.borderColor = 'rgba(255, 111, 143, 0.5)';
      } finally {
        card.style.opacity = '1';
        card.style.pointerEvents = 'auto';
      }
    }
  </script>
</body>
</html>
