<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangGraph RAG Console</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">AI Workspace</p>
        <h1 class="title">LangGraph RAG Console</h1>
      </div>
      <div class="topbar-actions">
        {% if user and user.is_admin %}
          <a href="/admin" class="admin-btn">관리자 페이지</a>
        {% endif %}
        <a href="/" class="admin-btn">홈</a>
        <a href="/logout" class="logout-btn">로그아웃</a>
      </div>
    </header>

    <main id="chat-box">
      <div class="message bot">
        <div class="bot-avatar"></div>
        <div class="content">
          <p class="message-title">Assistant</p>
          안녕하세요.<br><br>저는 임직원의 업무 효율을 높이기 위해 도입된 사내 AI 어시스턴트입니다.<br><br>어떤 도움이 필요하신가요?
        </div>
      </div>
    </main>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <input type="file" id="file-input" accept=".txt,.md,.pdf,.docx,.xlsx,.xlsm,.pptx" style="display:none" />
      <button id="attach-btn" title="파일 첨부">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <span id="file-badge" style="display:none"></span>
      <input type="text" id="user-input" placeholder="질문을 입력해 주세요" />
      <button id="send-btn">전송</button>
    </div>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
