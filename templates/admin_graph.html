<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그래프 뷰어 | Kaiper</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    .graph-shell {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .graph-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }

    .graph-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .graph-layout { grid-template-columns: 1fr; }
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-strong);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 22, 40, 0.6);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Graph Panel ── */
    .graph-box {
      padding: 24px;
      min-height: 500px;
      overflow: auto;
      display: flex;
      justify-content: center;
    }

    .graph-box svg {
      max-width: 100%;
      height: auto;
    }

    .graph-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* Node highlight animation */
    .node-active rect,
    .node-active circle,
    .node-active ellipse,
    .node-active polygon {
      fill: rgba(87, 208, 255, 0.25) !important;
      stroke: #57d0ff !important;
      stroke-width: 2.5px !important;
      filter: drop-shadow(0 0 6px rgba(87, 208, 255, 0.6));
    }

    .node-done rect,
    .node-done circle,
    .node-done ellipse,
    .node-done polygon {
      fill: rgba(124, 240, 200, 0.15) !important;
      stroke: #7cf0c8 !important;
      stroke-width: 1.5px !important;
    }

    /* ── Trace Feed ── */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected { background: var(--danger); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .trace-feed {
      height: 600px;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: "Consolas", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.7;
    }

    .trace-row {
      display: flex;
      gap: 6px;
      padding: 2px 0;
      border-bottom: 1px solid rgba(150, 190, 255, 0.05);
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .trace-ts   { color: #4a6a90; flex: 0 0 58px; font-size: 10px; }
    .trace-node { color: var(--text); font-weight: 600; flex: 0 0 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .trace-rest { color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .ev-enter { color: #7cf0c8; }
    .ev-exit  { color: #57d0ff; }
    .ev-call  { color: #b482ff; }

    .trace-divider {
      font-size: 10px;
      color: rgba(150,190,255,0.3);
      padding: 4px 0 2px;
      border-top: 1px solid rgba(150,190,255,0.1);
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 40px 0;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="graph-shell">
    <div class="graph-header">
      <div>
        <p class="eyebrow">Kaiper Admin</p>
        <h1 class="panel-title">그래프 뷰어</h1>
        <p class="panel-subtitle">LangGraph 구조 및 실시간 실행 흐름</p>
      </div>
      <div class="topbar-actions">
        <a href="/admin" class="admin-btn">Admin 홈</a>
        <a href="/admin/monitor" class="admin-btn">모니터</a>
        <a href="/" class="admin-btn">메인으로</a>
        <a href="/logout" class="logout-btn">로그아웃</a>
      </div>
    </div>

    <div class="graph-layout">

      <!-- Graph Structure -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">그래프 구조</span>
          <button class="icon-btn" id="reload-graph-btn">새로고침</button>
        </div>
        <div class="graph-box" id="graph-box">
          <div class="graph-loading" id="graph-loading">그래프 로드 중...</div>
        </div>
      </div>

      <!-- Real-time Trace Feed -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">
            <span class="status-dot" id="trace-dot"></span>실시간 실행 흐름
          </span>
          <button class="icon-btn" id="clear-trace-btn">초기화</button>
        </div>
        <div class="trace-feed" id="trace-feed">
          <div class="empty-state">요청 대기 중...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        background: '#0a1628',
        primaryColor: '#0f233c',
        primaryTextColor: '#c8d8f0',
        primaryBorderColor: '#1e3a5f',
        lineColor: '#3a6a9f',
        secondaryColor: '#0f2a4a',
        tertiaryColor: '#081828',
        edgeLabelBackground: '#0a1628',
        clusterBkg: '#0a1f3a',
      },
      flowchart: { curve: 'basis', htmlLabels: true },
    });

    function escapeHtml(str) {
      return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Graph ─────────────────────────────────────────────
    let svgEl = null;

    async function loadGraph() {
      const box = document.getElementById('graph-box');
      const loading = document.getElementById('graph-loading');
      loading.style.display = 'flex';
      if (svgEl) { svgEl.remove(); svgEl = null; }

      try {
        const res = await fetch('/admin/api/graph-mermaid');
        const data = await res.json();
        const { svg } = await mermaid.render('graph-svg', data.mermaid);

        loading.style.display = 'none';
        box.insertAdjacentHTML('beforeend', svg);
        svgEl = box.querySelector('svg');

        // SVG 노드에 data-node 속성 부여 (하이라이트용)
        if (svgEl) {
          svgEl.querySelectorAll('g.node, g[id^="flowchart-"]').forEach(g => {
            const idAttr = g.getAttribute('id') || '';
            // flowchart-NODE_NAME-N 형태에서 노드명 추출
            const m = idAttr.match(/^flowchart-(.+?)-\d+$/);
            if (m) g.setAttribute('data-node', m[1]);
          });
        }
      } catch (e) {
        loading.textContent = '그래프 로드 실패: ' + e.message;
      }
    }

    document.getElementById('reload-graph-btn').addEventListener('click', loadGraph);
    loadGraph();

    // ── Node Highlight ─────────────────────────────────────
    const _activeTimers = {};

    function highlightNode(nodeName) {
      if (!svgEl) return;

      // 정확한 노드명 + 부분 매칭(서브그래프 내부 노드 포함)
      const candidates = svgEl.querySelectorAll(`[data-node="${nodeName}"], [data-node$="_${nodeName}"], [data-node^="${nodeName}_"]`);
      // 접미사 _subgraph 형태도 매칭
      const allNodes = svgEl.querySelectorAll('[data-node]');
      const matched = Array.from(allNodes).filter(el => {
        const dn = el.getAttribute('data-node') || '';
        return dn === nodeName || dn.includes(nodeName) || nodeName.includes(dn.replace('_subgraph',''));
      });

      if (!matched.length) return;

      matched.forEach(el => {
        el.classList.remove('node-done');
        el.classList.add('node-active');
        clearTimeout(_activeTimers[el.getAttribute('data-node')]);
        _activeTimers[nodeName] = setTimeout(() => {
          el.classList.remove('node-active');
          el.classList.add('node-done');
          setTimeout(() => el.classList.remove('node-done'), 3000);
        }, 1200);
      });
    }

    // ── Trace SSE ─────────────────────────────────────────
    const traceFeed = document.getElementById('trace-feed');
    const traceDot  = document.getElementById('trace-dot');
    let feedInitialized = false;
    let lastTraceId = null;

    function appendTrace(record) {
      if (record.ping) return;

      if (!feedInitialized) {
        traceFeed.innerHTML = '';
        feedInitialized = true;
      }

      // trace_id 구분선
      if (record.trace_id && record.trace_id !== lastTraceId) {
        const div = document.createElement('div');
        div.className = 'trace-divider';
        div.textContent = `── trace ${record.trace_id.slice(0,8)}… ──`;
        traceFeed.appendChild(div);
        lastTraceId = record.trace_id;
      }

      const ts = record.ts ? new Date(record.ts * 1000).toLocaleTimeString('ko-KR', {hour12:false}) : '';
      const evClass = 'ev-' + (record.event || '');

      const row = document.createElement('div');
      row.className = 'trace-row';
      row.innerHTML =
        `<span class="trace-ts">${ts}</span>` +
        `<span class="trace-node">${escapeHtml(record.node || '')}</span>` +
        `<span class="trace-rest ${evClass}">[${record.event || ''}] ${escapeHtml(dataPreview(record.data))}</span>`;

      traceFeed.appendChild(row);
      traceFeed.scrollTop = traceFeed.scrollHeight;

      // 노드 하이라이트
      if (record.node && record.event === 'enter') {
        highlightNode(record.node);
      }
    }

    function dataPreview(data) {
      if (!data || Object.keys(data).length === 0) return '';
      return Object.entries(data)
        .slice(0, 3)
        .map(([k, v]) => `${k}=${JSON.stringify(v)}`)
        .join(' ');
    }

    document.getElementById('clear-trace-btn').addEventListener('click', () => {
      traceFeed.innerHTML = '<div class="empty-state">요청 대기 중...</div>';
      feedInitialized = false;
      lastTraceId = null;
    });

    function connectTraceSSE() {
      const es = new EventSource('/admin/api/trace/stream');
      es.onopen = () => traceDot.classList.remove('disconnected');
      es.onmessage = (e) => {
        try { appendTrace(JSON.parse(e.data)); } catch {}
      };
      es.onerror = () => {
        traceDot.classList.add('disconnected');
        es.close();
        setTimeout(connectTraceSSE, 3000);
      };
    }
    connectTraceSSE();
  </script>
</body>
</html>
