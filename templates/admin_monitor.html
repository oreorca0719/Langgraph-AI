<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모니터 | Kaiper</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .monitor-shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .monitor-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }

    .monitor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .monitor-grid { grid-template-columns: 1fr; }
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-strong);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 22, 40, 0.6);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Live Log ── */
    #log-box {
      height: 540px;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: "Consolas", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .log-row {
      display: flex;
      gap: 8px;
      padding: 2px 0;
      border-bottom: 1px solid rgba(150, 190, 255, 0.05);
      animation: fadeInUp 0.15s ease;
    }

    .log-ts {
      color: #4a6a90;
      flex: 0 0 68px;
    }

    .log-level {
      flex: 0 0 48px;
      font-weight: 700;
      text-align: center;
      border-radius: 4px;
      padding: 0 4px;
    }

    .log-msg {
      color: var(--text);
      word-break: break-all;
      flex: 1;
    }

    .level-PRINT  { color: #7cf0c8; }
    .level-INFO   { color: #57d0ff; }
    .level-WARNING{ color: #ffc966; }
    .level-ERROR  { color: #ff6f8f; }
    .level-DEBUG  { color: #6a8aaa; }
    .level-PING   { display: none; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected { background: var(--danger); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Routing Logs ── */
    .routing-table-wrap {
      height: 540px;
      overflow-y: auto;
    }

    .routing-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .routing-table th {
      position: sticky;
      top: 0;
      background: rgba(10, 22, 40, 0.95);
      color: var(--text-dim);
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    .routing-table td {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(150, 190, 255, 0.07);
      vertical-align: top;
    }

    .routing-table tr:hover td {
      background: rgba(87, 208, 255, 0.05);
    }

    .task-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .task-chat       { background: rgba(87, 208, 255, 0.15); color: #57d0ff; }
    .task-email_draft{ background: rgba(124, 240, 200, 0.15); color: #7cf0c8; }
    .task-file_extract{ background: rgba(255, 201, 102, 0.15); color: #ffc966; }
    .task-rfp_draft  { background: rgba(180, 130, 255, 0.15); color: #b482ff; }
    .task-unknown    { background: rgba(255, 111, 143, 0.15); color: #ff6f8f; }

    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--primary);
      min-width: 2px;
    }

    .score-val {
      color: var(--text-dim);
      font-size: 11px;
      white-space: nowrap;
    }

    .input-preview {
      color: var(--text-dim);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 40px 0;
      font-size: 13px;
    }

    /* ── Routing Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    @media (max-width: 900px) { .stats-grid { grid-template-columns: 1fr; } }

    .stat-body { padding: 14px 16px; }

    .stat-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 10px 0;
    }

    .source-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .source-label { flex: 0 0 120px; color: var(--text-dim); }

    .source-track {
      flex: 1;
      height: 6px;
      background: rgba(150,190,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .source-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .fill-semantic      { background: #57d0ff; }
    .fill-llm_fallback  { background: #7cf0c8; }
    .fill-rule_fallback { background: #ffc966; }
    .fill-unknown       { background: #ff6f8f; }
    .fill-other         { background: #b482ff; }

    .source-count { color: var(--text-dim); font-size: 11px; flex: 0 0 60px; text-align: right; }

    .kpi-row {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .kpi-item { flex: 1; text-align: center; }
    .kpi-val { font-size: 20px; font-weight: 700; color: var(--accent); }
    .kpi-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* ── Unknown Cases ── */
    .unknown-table-wrap { max-height: 300px; overflow-y: auto; }

    .unknown-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .unknown-table th {
      position: sticky;
      top: 0;
      background: rgba(10,22,40,0.95);
      color: var(--text-dim);
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    .unknown-table td {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(150,190,255,0.07);
      vertical-align: middle;
    }

    .unknown-table tr:hover td { background: rgba(87,208,255,0.05); }

    .task-select {
      background: rgba(10,22,40,0.8);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 11px;
      padding: 3px 6px;
    }

    .assign-btn {
      background: rgba(87,208,255,0.1);
      border: 1px solid rgba(87,208,255,0.3);
      border-radius: 6px;
      color: #57d0ff;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
    }

    .assign-btn:hover { background: rgba(87,208,255,0.2); }
    .assign-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Trace Flow ── */
    .trace-card {
      margin-top: 16px;
    }

    .trace-table-wrap {
      height: 400px;
      overflow-y: auto;
    }

    .trace-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .trace-table th {
      position: sticky;
      top: 0;
      background: rgba(10, 22, 40, 0.95);
      color: var(--text-dim);
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    .trace-table td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(150, 190, 255, 0.05);
      vertical-align: top;
    }

    .trace-table tr:hover td { background: rgba(87, 208, 255, 0.04); }

    .trace-group-row td {
      background: rgba(10, 22, 40, 0.5);
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 10px;
      border-top: 1px solid rgba(150,190,255,0.1);
    }

    .trace-event-row td { padding: 3px 10px 3px 24px; }

    .event-node {
      font-family: "Consolas", monospace;
      color: var(--text);
      white-space: nowrap;
    }

    .label-preview { color: #ffc966; font-size: 10px; font-weight: 700; }
    .label-execute { color: #57d0ff; font-size: 10px; font-weight: 700; }

    .event-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .event-enter  { background: rgba(124,240,200,0.12); color: #7cf0c8; }
    .event-exit   { background: rgba(87,208,255,0.12);  color: #57d0ff; }
    .event-call   { background: rgba(180,130,255,0.12); color: #b482ff; }

    .trace-data {
      color: var(--text-dim);
      font-size: 11px;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="monitor-shell">
    <div class="monitor-header">
      <div>
        <p class="eyebrow">Kaiper Admin</p>
        <h1 class="panel-title">모니터</h1>
        <p class="panel-subtitle">관리자: <strong>{{ user.email }}</strong></p>
      </div>
      <div class="topbar-actions">
        <a href="/admin" class="admin-btn">Admin 홈</a>
        <a href="/" class="admin-btn">메인으로</a>
        <a href="/logout" class="logout-btn">로그아웃</a>
      </div>
    </div>

    <div class="monitor-grid">

      <!-- Live Log -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">
            <span class="status-dot" id="status-dot"></span>Live Log
          </span>
          <div class="card-actions">
            <button class="icon-btn" id="scroll-toggle">자동스크롤 ON</button>
            <button class="icon-btn" id="clear-btn">초기화</button>
          </div>
        </div>
        <div id="log-box"></div>
      </div>

      <!-- Routing Decisions -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">라우팅 결정 이력</span>
          <div style="display:flex;gap:8px"><button class="refresh-btn" id="refresh-routing">새로고침</button><button class="refresh-btn" id="delete-all-btn" style="color:var(--danger);border-color:rgba(255,111,143,0.4)">전체 삭제</button></div>
        </div>
        <div class="routing-table-wrap">
          <table class="routing-table">
            <thead>
              <tr>
                <th>시각</th>
                <th>사용자</th>
                <th>입력</th>
                <th>결정</th>
                <th>Score</th>
                <th>Margin</th>
                <th>방식</th>
              <th></th>
              </tr>
            </thead>
            <tbody id="routing-tbody">
              <tr><td colspan="7" class="empty-state">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Routing Stats + Unknown Cases -->
    <div class="stats-grid">

      <!-- 라우팅 성능 통계 -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">라우팅 성능</span>
          <button class="refresh-btn" id="refresh-stats">새로고침</button>
        </div>
        <div class="stat-body" id="stats-body">
          <div class="empty-state">불러오는 중...</div>
        </div>
      </div>

      <!-- Unknown 케이스 관리 -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Unknown 케이스 관리</span>
          <button class="refresh-btn" id="refresh-unknown">새로고침</button>
        </div>
        <div class="unknown-table-wrap">
          <table class="unknown-table">
            <thead>
              <tr>
                <th>시각</th>
                <th>입력</th>
                <th>분류 지정</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="unknown-tbody">
              <tr><td colspan="4" class="empty-state">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Trace Flow -->
    <div class="card trace-card">
      <div class="card-head">
        <span class="card-title">요청 실행 흐름</span>
        <button class="refresh-btn" id="refresh-traces">새로고침</button>
      </div>
      <div class="trace-table-wrap">
        <table class="trace-table">
          <thead>
            <tr>
              <th>시각</th>
              <th>노드</th>
              <th>레이블</th>
              <th>이벤트</th>
              <th>데이터</th>
            </tr>
          </thead>
          <tbody id="trace-tbody">
            <tr><td colspan="5" class="empty-state">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const logBox = document.getElementById('log-box');
    const statusDot = document.getElementById('status-dot');
    const scrollToggle = document.getElementById('scroll-toggle');
    const clearBtn = document.getElementById('clear-btn');
    const refreshBtn = document.getElementById('refresh-routing');
    const routingTbody = document.getElementById('routing-tbody');

    let autoScroll = true;

    scrollToggle.addEventListener('click', () => {
      autoScroll = !autoScroll;
      scrollToggle.textContent = autoScroll ? '자동스크롤 ON' : '자동스크롤 OFF';
    });

    clearBtn.addEventListener('click', () => {
      logBox.innerHTML = '';
    });

    function levelClass(level) {
      return 'level-' + (level || 'INFO');
    }

    function appendLog(record) {
      if (record.level === 'PING') return;
      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML =
        `<span class="log-ts">${record.ts || ''}</span>` +
        `<span class="log-level ${levelClass(record.level)}">${record.level || ''}</span>` +
        `<span class="log-msg">${escapeHtml(record.msg || '')}</span>`;
      logBox.appendChild(row);
      if (autoScroll) logBox.scrollTop = logBox.scrollHeight;
    }

    function escapeHtml(str) {
      return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // SSE 연결
    function connectSSE() {
      const es = new EventSource('/admin/logs/stream');
      es.onopen = () => {
        statusDot.classList.remove('disconnected');
      };
      es.onmessage = (e) => {
        try {
          const record = JSON.parse(e.data);
          appendLog(record);
        } catch {}
      };
      es.onerror = () => {
        statusDot.classList.add('disconnected');
        es.close();
        setTimeout(connectSSE, 3000);
      };
    }
    connectSSE();

    // 라우팅 로그 테이블
    function taskBadge(task) {
      return `<span class="task-badge task-${task}">${task}</span>`;
    }

    function scoreBar(val) {
      const n = parseFloat(val);
      if (isNaN(n)) return '<span class="score-val">-</span>';
      const pct = Math.round(n * 100);
      return `<div class="score-bar-wrap">
        <div class="score-bar" style="width:${pct}px"></div>
        <span class="score-val">${n.toFixed(3)}</span>
      </div>`;
    }

    function modeLabel(mode) {
      const map = { semantic: '임베딩', rule_fallback: '규칙', llm_fallback: 'LLM' };
      return map[mode] || mode || '-';
    }

    async function loadRoutingLogs() {
      routingTbody.innerHTML = '<tr><td colspan="7" class="empty-state">불러오는 중...</td></tr>';
      try {
        const res = await fetch('/admin/api/routing-logs');
        const logs = await res.json();
        if (!logs.length) {
          routingTbody.innerHTML = '<tr><td colspan="7" class="empty-state">데이터 없음</td></tr>';
          return;
        }
        routingTbody.innerHTML = logs.map(log => `
          <tr>
            <td style="white-space:nowrap;color:var(--text-dim)">${log.ts_str || ''}</td>
            <td style="color:var(--text-dim);font-size:12px">${escapeHtml(log.user_id || '')}</td>
            <td><div class="input-preview" title="${escapeHtml(log.input_text)}">${escapeHtml(log.input_text)}</div></td>
            <td>${taskBadge(log.final_task)}</td>
            <td>${scoreBar(log.top1_score)}</td>
            <td>${scoreBar(log.margin)}</td>
            <td style="color:var(--text-dim)">${modeLabel(log.mode)}</td>
            <td><button class="icon-btn delete-row-btn" data-id="${log.log_id}">삭제</button></td>
          </tr>
        `).join('');
      } catch (e) {
        routingTbody.innerHTML = `<tr><td colspan="7" class="empty-state">오류: ${e.message}</td></tr>`;
      }
    }

    refreshBtn.addEventListener('click', loadRoutingLogs);

    document.getElementById('delete-all-btn').addEventListener('click', async () => {
      if (!confirm('라우팅 로그 전체를 삭제하시겠습니까?')) return;
      await fetch('/admin/api/routing-logs', { method: 'DELETE' });
      loadRoutingLogs();
    });

    routingTbody.addEventListener('click', async (e) => {
      const btn = e.target.closest('.delete-row-btn');
      if (!btn) return;
      btn.disabled = true;
      const logId = btn.dataset.id;
      await fetch('/admin/api/routing-logs/' + encodeURIComponent(logId), { method: 'DELETE' });
      loadRoutingLogs();
    });
    loadRoutingLogs();

    // ── Trace Flow ──
    const traceTbody = document.getElementById('trace-tbody');
    const refreshTracesBtn = document.getElementById('refresh-traces');

    function labelBadge(label) {
      return `<span class="label-${label}">[${label}]</span>`;
    }

    function eventBadge(event) {
      return `<span class="event-badge event-${event}">${event}</span>`;
    }

    function formatTraceData(data) {
      if (!data || Object.keys(data).length === 0) return '';
      return Object.entries(data)
        .filter(([k]) => k !== '_trace_label')
        .map(([k, v]) => `${k}=${JSON.stringify(v)}`)
        .join('  ');
    }

    async function loadTraces() {
      traceTbody.innerHTML = '<tr><td colspan="5" class="empty-state">불러오는 중...</td></tr>';
      try {
        const res = await fetch('/admin/api/traces');
        const traces = await res.json();
        if (!traces.length) {
          traceTbody.innerHTML = '<tr><td colspan="5" class="empty-state">데이터 없음</td></tr>';
          return;
        }
        let rows = '';
        for (const trace of traces) {
          const shortId = trace.trace_id.slice(0, 8);
          rows += `<tr class="trace-group-row">
            <td colspan="5">${trace.ts_str || ''} &nbsp; trace: ${shortId}…</td>
          </tr>`;
          for (const ev of (trace.events || [])) {
            rows += `<tr class="trace-event-row">
              <td></td>
              <td class="event-node">${escapeHtml(ev.node || '')}</td>
              <td>${labelBadge(ev.label || 'execute')}</td>
              <td>${eventBadge(ev.event || '')}</td>
              <td class="trace-data" title="${escapeHtml(JSON.stringify(ev.data || {}))}">${escapeHtml(formatTraceData(ev.data || {}))}</td>
            </tr>`;
          }
        }
        traceTbody.innerHTML = rows;
      } catch (e) {
        traceTbody.innerHTML = `<tr><td colspan="5" class="empty-state">오류: ${e.message}</td></tr>`;
      }
    }

    refreshTracesBtn.addEventListener('click', loadTraces);
    loadTraces();

    // ── Routing Stats ──
    const statsBody = document.getElementById('stats-body');
    const unknownTbody = document.getElementById('unknown-tbody');

    const TASK_OPTIONS = ['chat', 'email_draft', 'file_extract', 'rfp_draft'];

    function sourceFillClass(source) {
      if (['semantic', 'llm_fallback', 'rule_fallback', 'unknown'].includes(source)) return 'fill-' + source;
      return 'fill-other';
    }

    function sourceDisplayName(source) {
      const map = {
        semantic: '시맨틱',
        llm_fallback: 'LLM Fallback',
        rule_fallback: '규칙 Fallback',
        unknown: 'Unknown',
        semantic_unknown: 'Unknown (시맨틱)',
        file_context_fallback: '파일 컨텍스트',
      };
      return map[source] || source;
    }

    async function loadRoutingStats() {
      statsBody.innerHTML = '<div class="empty-state">불러오는 중...</div>';
      unknownTbody.innerHTML = '<tr><td colspan="4" class="empty-state">불러오는 중...</td></tr>';
      try {
        const res = await fetch('/admin/api/routing-stats');
        const data = await res.json();

        const total = data.total || 0;
        const sourceCounts = data.source_counts || {};
        const taskCounts = data.task_counts || {};

        // source 분포 바
        let sourceHtml = '<p class="stat-section-title">분류 방식 분포</p>';
        for (const [src, cnt] of Object.entries(sourceCounts).sort((a,b) => b[1]-a[1])) {
          const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
          sourceHtml += `
            <div class="source-bar-row">
              <span class="source-label">${sourceDisplayName(src)}</span>
              <div class="source-track"><div class="source-fill ${sourceFillClass(src)}" style="width:${pct}%"></div></div>
              <span class="source-count">${cnt}건 (${pct}%)</span>
            </div>`;
        }

        // task 분포 바
        sourceHtml += '<p class="stat-section-title" style="margin-top:14px">Task 분포</p>';
        for (const [task, cnt] of Object.entries(taskCounts).sort((a,b) => b[1]-a[1])) {
          const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
          sourceHtml += `
            <div class="source-bar-row">
              <span class="source-label">${taskBadge(task)}</span>
              <div class="source-track"><div class="source-fill ${sourceFillClass('semantic')}" style="width:${pct}%"></div></div>
              <span class="source-count">${cnt}건 (${pct}%)</span>
            </div>`;
        }

        // KPI
        sourceHtml += `
          <div class="kpi-row">
            <div class="kpi-item">
              <div class="kpi-val">${total}</div>
              <div class="kpi-label">총 요청</div>
            </div>
            <div class="kpi-item">
              <div class="kpi-val">${data.avg_top1_score ?? '-'}</div>
              <div class="kpi-label">평균 Top1 Score</div>
            </div>
            <div class="kpi-item">
              <div class="kpi-val">${data.avg_margin ?? '-'}</div>
              <div class="kpi-label">평균 Margin</div>
            </div>
          </div>`;

        statsBody.innerHTML = sourceHtml;

        // Unknown 케이스 목록
        const cases = data.unknown_cases || [];
        if (!cases.length) {
          unknownTbody.innerHTML = '<tr><td colspan="4" class="empty-state">Unknown 케이스 없음</td></tr>';
          return;
        }
        unknownTbody.innerHTML = cases.map(c => `
          <tr>
            <td style="white-space:nowrap;color:var(--text-dim)">${c.ts_str}</td>
            <td><div class="input-preview" title="${escapeHtml(c.input_text)}">${escapeHtml(c.input_text)}</div></td>
            <td>
              <select class="task-select" data-text="${escapeHtml(c.input_text)}">
                ${TASK_OPTIONS.map(t => `<option value="${t}">${t}</option>`).join('')}
              </select>
            </td>
            <td>
              <button class="assign-btn" data-text="${escapeHtml(c.input_text)}">추가</button>
            </td>
          </tr>
        `).join('');

      } catch(e) {
        statsBody.innerHTML = `<div class="empty-state">오류: ${e.message}</div>`;
      }
    }

    unknownTbody.addEventListener('click', async (e) => {
      const btn = e.target.closest('.assign-btn');
      if (!btn) return;
      const row = btn.closest('tr');
      const select = row.querySelector('.task-select');
      const task = select.value;
      const text = btn.dataset.text;
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const res = await fetch('/admin/api/intent-samples', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, text }),
        });
        const data = await res.json();
        if (data.ok) {
          btn.textContent = data.added ? '완료' : '중복';
          btn.style.color = data.added ? '#7cf0c8' : '#ffc966';
        } else {
          btn.textContent = '오류';
          btn.disabled = false;
        }
      } catch {
        btn.textContent = '오류';
        btn.disabled = false;
      }
    });

    document.getElementById('refresh-stats').addEventListener('click', loadRoutingStats);
    document.getElementById('refresh-unknown').addEventListener('click', loadRoutingStats);
    loadRoutingStats();
  </script>
</body>
</html>
